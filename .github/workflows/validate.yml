name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python
        run: python -m compileall custom_components/dmr_hotspot

      - name: Validate JSON
        run: |
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/dmr_hotspot/manifest.json > /dev/null
          python -m json.tool custom_components/dmr_hotspot/strings.json > /dev/null
