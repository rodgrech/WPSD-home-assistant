# Example Motorola R7-inspired Lovelace card for the DMR Hotspot integration.
#
# Required custom card:
# https://github.com/custom-cards/button-card

type: custom:button-card
entity: sensor.dmr_hotspot_status
show_name: false
show_state: false
show_icon: false
grid_options:
  columns: 5
  rows: 6
tap_action:
  action: more-info
styles:
  card:
    - width: 380px
    - max-width: 100%
    - margin: 0 auto
    - padding: 0
    - border-radius: 8px
    - background: transparent
    - box-shadow: none
    - overflow: visible
  grid:
    - grid-template-areas: '"radio"'
    - grid-template-columns: 1fr
    - grid-template-rows: auto
  custom_fields:
    radio:
      - width: 100%
      - display: block
      - line-height: 0
custom_fields:
  radio: |
    [[[
      const callsign = states['sensor.dmr_hotspot_callsign']?.state || 'DMR';
      const talkgroup = states['sensor.dmr_hotspot_talkgroup']?.state || 'TG ---';
      const mode = states['sensor.dmr_hotspot_mode']?.state || 'DMR';
      const network = states['sensor.dmr_hotspot_network']?.state || 'WPSD';
      const source = states['sensor.dmr_hotspot_source']?.state || '--';
      const loss = states['sensor.dmr_hotspot_loss']?.state || '0%';
      const ber = states['sensor.dmr_hotspot_ber']?.state;
      const name = states['sensor.dmr_hotspot_name']?.state;
      const timestamp = states['sensor.dmr_hotspot_timestamp']?.state || '';
      const caller = name && name !== 'unknown' && name !== 'unavailable' ? `${callsign} - ${name}` : callsign;
      const dateText = timestamp && timestamp.length >= 10 ? timestamp.slice(0, 10).split('-').reverse().join('/') : '22/05/2026';
      const timeText = timestamp && timestamp.length >= 16 ? timestamp.slice(11, 16) : '19:29';
      const channel = talkgroup.replace('TG ', '');
      const berText = ber && ber !== 'unknown' && ber !== 'unavailable' ? ber : '--';
      const zoneLine = `BER ${berText} / Loss ${loss}`;
      const activity = source.toLowerCase() === 'rf' ? 'tx' : source.toLowerCase() === 'net' ? 'rx' : 'standby';

      return `
        <style>
          .r7-radio {
            width: 360px;
            max-width: 100%;
            margin: 0 auto;
            padding: 12px 16px 14px;
            box-sizing: border-box;
            border-radius: 22px 22px 14px 14px;
            background:
              linear-gradient(90deg, #111316 0 13px, transparent 13px calc(100% - 13px), #111316 calc(100% - 13px)),
              linear-gradient(#373b40, #111316);
            border: 2px solid #070809;
            box-shadow:
              inset 0 1px 0 rgba(255,255,255,.14),
              inset 0 -8px 12px rgba(0,0,0,.44),
              0 5px 14px rgba(0,0,0,.44);
            color: #152737;
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 0;
          }

          .r7-brand {
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e7ecef;
            font-size: 14px;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
          }

          .r7-screen-bezel {
            padding: 6px;
            border-radius: 7px;
            background: #070809;
            box-shadow: inset 0 0 0 1px #2f363b;
          }

          .r7-screen {
            height: 252px;
            overflow: hidden;
            border-radius: 3px;
            background:
              radial-gradient(circle at 30% 82%, rgba(17, 146, 210, .45), transparent 30%),
              radial-gradient(circle at 78% 72%, rgba(75, 194, 225, .35), transparent 34%),
              linear-gradient(#dcf8fb 0 52%, #9fe7ee 72%, #40c5e1 100%);
            box-shadow: inset 0 0 0 1px rgba(0,0,0,.3);
          }

          .r7-iconbar {
            height: 26px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 5px;
            padding: 0 8px;
            box-sizing: border-box;
            background: #1a2230;
            color: #f2f7fb;
            font-size: 12px;
            font-weight: 800;
            line-height: 1;
          }

          .r7-status-icons {
            display: inline-flex;
            align-items: center;
            gap: 5px;
          }

          .r7-datebar {
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            box-sizing: border-box;
            background: rgba(194, 241, 245, .82);
            color: #183244;
            font-size: 15px;
            font-weight: 500;
            line-height: 1;
          }

          .r7-datebar span {
            min-width: 0;
            white-space: nowrap;
          }

          .r7-main {
            height: 157px;
            padding: 9px 10px 7px;
            box-sizing: border-box;
          }

          .r7-card {
            height: 128px;
            display: grid;
            grid-template-columns: 9px 1fr;
            column-gap: 11px;
            padding: 10px 11px;
            box-sizing: border-box;
            background: rgba(252, 252, 238, .9);
            border: 1px solid rgba(120, 155, 166, .7);
            box-shadow: 0 2px 4px rgba(0,0,0,.2);
          }

          .r7-activity {
            background: ${activity === 'tx' ? '#d92323' : activity === 'rx' ? '#ffd51f' : '#178ee8'};
            height: 100%;
            border-radius: 1px;
            animation: ${activity === 'standby' ? 'none' : 'r7-activity-pulse 900ms steps(2, end) infinite'};
          }

          @keyframes r7-activity-pulse {
            0%, 45% {
              opacity: 1;
            }
            46%, 100% {
              opacity: .52;
            }
          }

          .r7-lines {
            min-width: 0;
            display: grid;
            grid-template-rows: 28px 40px 29px;
            row-gap: 3px;
            padding: 0;
            box-sizing: border-box;
          }

          .r7-zone {
            min-width: 0;
            color: #355264;
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          .r7-channel {
            min-width: 0;
            color: #1f2f38;
            font-size: 22px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          .r7-caller {
            min-width: 0;
            color: #5d707b;
            font-size: 12px;
            font-weight: 500;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          .r7-softkeys {
            height: 36px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #1798d0;
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            line-height: 36px;
            text-align: center;
            overflow: hidden;
          }

          .r7-softkeys span + span {
            border-left: 1px solid rgba(255,255,255,.45);
          }

          ha-icon {
            --mdc-icon-size: 15px;
            width: 15px;
            height: 15px;
            display: inline-flex;
            flex: 0 0 15px;
            align-items: center;
            justify-content: center;
            line-height: 1;
          }
        </style>

        <div class="r7-radio">
          <div class="r7-brand">WPSD DMR</div>
          <div class="r7-screen-bezel">
            <div class="r7-screen">
              <div class="r7-iconbar">
                <span class="r7-status-icons">
                  <ha-icon icon="mdi:signal-cellular-3"></ha-icon>
                  <ha-icon icon="mdi:wifi"></ha-icon>
                  <ha-icon icon="mdi:volume-high"></ha-icon>
                </span>
                <span>${source}</span>
              </div>

              <div class="r7-datebar">
                <span>${dateText}</span>
                <span>${timeText}</span>
              </div>

              <div class="r7-main">
                <div class="r7-card">
                  <div class="r7-activity"></div>
                  <div class="r7-lines">
                    <div class="r7-zone">${zoneLine}</div>
                    <div class="r7-channel">${channel}</div>
                    <div class="r7-caller">${caller}</div>
                  </div>
                </div>
              </div>

              <div class="r7-softkeys">
                <span>Zones</span>
                <span>Contact</span>
              </div>
            </div>
          </div>
        </div>
      `;
    ]]]
