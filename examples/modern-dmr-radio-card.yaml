# Example modern DMR radio screen card for the DMR Hotspot integration.
#
# Required custom card:
# https://github.com/custom-cards/button-card

type: custom:button-card
entity: sensor.dmr_hotspot_status
show_name: false
show_state: false
show_icon: false
grid_options:
  columns: 6
  rows: 4
tap_action:
  action: more-info
styles:
  card:
    - width: 380px
    - max-width: 100%
    - margin: 0 auto
    - padding: 0
    - border-radius: 8px
    - background: transparent
    - box-shadow: none
    - overflow: visible
  grid:
    - grid-template-areas: '"radio"'
    - grid-template-columns: 1fr
    - grid-template-rows: auto
  custom_fields:
    radio:
      - width: 100%
      - display: block
      - line-height: 0
custom_fields:
  radio: |
    [[[
      const callsign = states['sensor.dmr_hotspot_callsign']?.state || 'DMR';
      const talkgroup = states['sensor.dmr_hotspot_talkgroup']?.state || 'TG ---';
      const mode = states['sensor.dmr_hotspot_mode']?.state || 'DMR';
      const source = states['sensor.dmr_hotspot_source']?.state || '--';
      const loss = states['sensor.dmr_hotspot_loss']?.state || '0%';
      const duration = states['sensor.dmr_hotspot_duration']?.state;
      const ber = states['sensor.dmr_hotspot_ber']?.state;
      const berText = ber && ber !== 'unknown' && ber !== 'unavailable' ? `BER: ${ber}` : `LOSS: ${loss}`;
      const durationText = duration && duration !== 'unknown' && duration !== 'unavailable' ? `${duration}s` : source;

      return `
        <style>
          .dmr-screen {
            width: 370px;
            max-width: 100%;
            height: 246px;
            margin: 0 auto;
            overflow: hidden;
            box-sizing: border-box;
            border: 8px solid #08090b;
            border-radius: 9px;
            background: #141414;
            box-shadow:
              inset 0 0 0 1px rgba(255,255,255,.05),
              0 4px 12px rgba(0,0,0,.45);
            color: #f3f3f3;
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 0;
          }

          .dmr-topbar {
            height: 25px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 6px;
            padding: 0 7px;
            box-sizing: border-box;
            background: #3677d8;
            color: #fff;
            font-size: 13px;
            font-weight: 800;
            line-height: 1;
          }

          .dmr-date {
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          .dmr-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #39e35c;
            box-shadow: 0 0 5px rgba(57,227,92,.7);
          }

          .dmr-status-icons {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
            min-width: 0;
          }

          .dmr-body {
            height: 180px;
            display: grid;
            grid-template-rows: 36px 52px 31px 26px;
            align-items: center;
            justify-items: center;
            padding: 20px 14px 12px;
            box-sizing: border-box;
            background:
              radial-gradient(circle at 50% 22%, rgba(255,255,255,.08), transparent 30%),
              #171717;
          }

          .dmr-talkgroup {
            min-width: 0;
            max-width: 100%;
            color: #ffffff;
            font-size: 24px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          .dmr-callsign {
            min-width: 0;
            max-width: 100%;
            color: #e1e1e1;
            font-size: 29px;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          .dmr-meta {
            min-width: 0;
            max-width: 100%;
            color: #aeb0b4;
            font-size: 16px;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          .dmr-submeta {
            min-width: 0;
            max-width: 100%;
            color: #c8c8c8;
            font-size: 14px;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          .dmr-softkeys {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 29px;
            background: #3677d8;
            color: #fff;
            font-size: 14px;
            font-weight: 900;
            line-height: 29px;
            text-align: center;
          }

          .dmr-softkeys span + span {
            border-left: 1px solid rgba(255,255,255,.36);
          }

          ha-icon {
            --mdc-icon-size: 14px;
            width: 14px;
            height: 14px;
            display: inline-flex;
            flex: 0 0 14px;
            align-items: center;
            justify-content: center;
            line-height: 1;
          }
        </style>

        <div class="dmr-screen">
          <div class="dmr-topbar">
            <span class="dmr-date">26/08/25</span>
            <span class="dmr-dot"></span>
            <span class="dmr-status-icons">
              <ha-icon icon="mdi:wifi"></ha-icon>
              <ha-icon icon="mdi:signal-cellular-3"></ha-icon>
              <span>07:39 pm</span>
            </span>
          </div>

          <div class="dmr-body">
            <div class="dmr-talkgroup">TG: ${talkgroup}</div>
            <div class="dmr-callsign">${callsign}</div>
            <div class="dmr-meta">${mode} - ${durationText}</div>
            <div class="dmr-submeta">${berText}</div>
          </div>

          <div class="dmr-softkeys">
            <span>Zones</span>
            <span>Contacts</span>
          </div>
        </div>
      `;
    ]]]
